<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <rect width="512" height="512" fill="none"/>
  <!-- open book: left page -->
  <path d="M96 160c60-18 116-14 160 20v220c-52-34-104-38-160-20V160Z" fill="#3B4A6B"/>
  <!-- open book: right page -->
  <path d="M256 180c44-34 100-38 160-20v220c-56-18-108-14-160 20V180Z" fill="#4A5B80"/>
  <!-- spine -->
  <line x1="256" y1="180" x2="256" y2="400" stroke="#2C3A56" stroke-width="8" stroke-linecap="round"/>
  <!-- text lines left page -->
  <rect x="128" y="210" width="96" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="128" y="228" width="112" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="128" y="246" width="80" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="128" y="264" width="104" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <!-- text lines right page -->
  <rect x="288" y="210" width="96" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="288" y="228" width="112" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="288" y="246" width="80" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <rect x="288" y="264" width="104" height="6" rx="3" fill="#8FA0C0" opacity="0.5"/>
  <!-- evidence location marker (pin) on the right page -->
  <circle cx="360" cy="290" r="24" fill="#E05A4A" opacity="0.92"/>
  <circle cx="360" cy="290" r="12" fill="#FFF8F0"/>
  <!-- crosshair inside pin -->
  <line x1="352" y1="290" x2="368" y2="290" stroke="#C04438" stroke-width="3" stroke-linecap="round"/>
  <line x1="360" y1="282" x2="360" y2="298" stroke="#C04438" stroke-width="3" stroke-linecap="round"/>
</svg>
